<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>{% block title %}왕과 사는 남자 테스트 | 당신의 충성도는?{% endblock %}</title>
    <meta
      name="description"
      content="{% block meta_description %}왕과 사는 남자 세계관에서 즐기는 충성도 테스트와 단종 응원 미니게임{% endblock %}"
    >
    <meta
      property="og:title"
      content="{% block og_title %}왕과 사는 남자: 충성도 테스트{% endblock %}"
    >
    <meta
      property="og:description"
      content="{% block og_description %}당신은 공동체에서 끝까지 남는 사람인가요?{% endblock %}"
    >
    <meta
      property="og:image"
      content="{% block og_image %}/images/포스터.png{% endblock %}"
    >
    <meta name="google-site-verification" content="QXQDwKcTYQ4IQcjdSj9OViyVqktvjVbp9Qac2MBe8e0">
    <meta name="theme-color" content="#0d1324">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9099849069344342" crossorigin="anonymous"></script>
    <link
      rel="stylesheet"
      href="/static/css/style.css"
    >
    {% block extra_head %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="site-shell">
      <header class="site-header">
        <div class="container site-header__inner">
          <a class="site-logo" href="/">왕과 사는 남자</a>
          <nav class="site-nav">
            <a href="/">홈</a>
            <a href="/test">테스트</a>
          </nav>
        </div>
      </header>

      <main class="site-main">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <div class="adfit-banner-pc">
          <ins class="kakao_ad_area" style="display:none;"
            data-ad-unit="DAN-wKDW3ugpDS3wc6bF"
            data-ad-width="728"
            data-ad-height="90"></ins>
        </div>
        <p>Contact</p>
        <p>Email: <a class="site-footer__link" href="mailto:um5130946@gmail.com">um5130946@gmail.com</a></p>
        <p>Instagram: <a class="site-footer__link" href="https://www.instagram.com/mundap/" target="_blank" rel="noopener noreferrer">@Mundap</a></p>
      </footer>
    </div>

    <script type="text/javascript" src="https://t1.daumcdn.net/kas/static/ba.min.js" async></script>
    <script src="/static/js/share.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
