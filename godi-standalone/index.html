<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>당신은 왕을 지킬 자격이 있는가</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif KR", "Nanum Myeongjo", "Malgun Gothic", serif;
      background: linear-gradient(135deg, #e8ddd0 0%, #d4c4b0 30%, #c9b89a 70%, #b8a078 100%);
      color: #3d2c1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 720px;
    }
    .screen.active { display: flex; }
    .main-title {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      color: #4a3525;
      margin-bottom: 8px;
      text-align: center;
    }
    .sub-title {
      font-size: clamp(1rem, 3vw, 1.2rem);
      color: #5c4535;
      margin-bottom: 24px;
      text-align: center;
    }
    .panel {
      background: rgba(255, 250, 240, 0.85);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border: 1px solid rgba(139, 115, 85, 0.3);
    }
    .desc {
      text-align: center;
      line-height: 1.7;
      color: #5c4535;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .input-wrap {
      margin-bottom: 20px;
    }
    .input-wrap label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #4a3525;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #8b7355;
      border-radius: 10px;
      font-size: 1rem;
      background: #fffef9;
    }
    .difficulty-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .diff-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 16px;
      border: 2px solid #8b7355;
      border-radius: 10px;
      background: rgba(255,250,240,0.8);
      color: #4a3525;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn:hover { background: rgba(212, 168, 79, 0.2); }
    .diff-btn.active {
      background: #8b7355;
      color: #fffef9;
      border-color: #6b5344;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      background: linear-gradient(180deg, #c9a855 0%, #a8843a 100%);
      color: #fffef9;
      box-shadow: 0 4px 12px rgba(139,115,85,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139,115,85,0.4);
    }
    .btn-secondary {
      background: rgba(139,115,85,0.25);
      color: #4a3525;
      border: 2px solid #8b7355;
    }
    .btn-secondary:hover { background: rgba(139,115,85,0.35); }
    .best-record {
      margin-top: 20px;
      padding: 12px;
      background: rgba(139,115,85,0.1);
      border-radius: 8px;
      text-align: center;
      font-size: 0.9rem;
      color: #5c4535;
    }
    .game-shell {
      position: relative;
      width: 100%;
      max-width: min(720px, 88vw);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(255,250,240,0.9);
      border-radius: 12px;
      border: 1px solid rgba(139,115,85,0.25);
    }
    .hud-item {
      font-size: 1rem;
      font-weight: 600;
      color: #4a3525;
    }
    .timer { font-variant-numeric: tabular-nums; font-size: 1.2rem; }
    .game-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 60vh;
    }
    .bowl-img, .soup-img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      pointer-events: none;
    }
    .bowl-img { z-index: 1; }
    .soup-img { z-index: 2; transition: opacity 0.2s; }
    .ingredients-container {
      position: absolute;
      left: 19%;
      top: 33%;
      width: 62%;
      height: 36%;
      z-index: 3;
      overflow: hidden;
      clip-path: ellipse(50% 50% at 50% 50%);
      pointer-events: none;
    }
    .ingredients-container > * { pointer-events: auto; }
    .ingredient {
      position: absolute;
      user-select: none;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
    }
    .ingredient:hover { transform: scale(1.05); }
    .ingredient img {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .countdown-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 800;
      color: #fffef9;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .countdown-overlay.hidden { display: none; }
    .pop-text {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 14px;
      color: #8b7355;
      font-weight: 700;
      animation: popFade 0.6s ease-out forwards;
    }
    @keyframes popFade {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3) translateY(-20px); }
    }
    .result-grade { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; color: #4a3525; }
    .result-ment { line-height: 1.7; margin-bottom: 16px; color: #5c4535; }
    .result-time { font-size: 1.2rem; color: #8b7355; margin-bottom: 8px; }
    .result-best { color: #a8843a; font-weight: 700; margin-top: 12px; }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn-row .btn { flex: 1; }
  </style>
</head>
<body>
  <div id="startScreen" class="screen active">
    <h1 class="main-title">당신은 왕을 지킬 자격이 있는가</h1>
    <p class="sub-title">다슬기국 빨리 먹기</p>
    <div class="panel">
      <p class="desc">국물 위 건더기를 전부 클릭해서 없애세요.<br>모든 건더기를 다 먹으면 빈 그릇이 됩니다.</p>
      <div class="input-wrap">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="20">
      </div>
      <div class="difficulty-row">
        <button type="button" class="diff-btn" data-diff="easy">쉬움</button>
        <button type="button" class="diff-btn" data-diff="medium">중간</button>
        <button type="button" class="diff-btn" data-diff="hard">어려움</button>
      </div>
      <button type="button" class="btn btn-primary" id="startBtn">시작</button>
      <div class="best-record" id="bestRecord">최고 기록: -</div>
    </div>
  </div>

  <div id="gameScreen" class="screen">
    <h1 class="main-title">다슬기국 빨리 먹기</h1>
    <div class="game-shell">
      <div class="hud">
        <span class="hud-item timer" id="timer">00:00:00</span>
        <span class="hud-item" id="diffLabel">난이도: -</span>
        <span class="hud-item" id="remainingLabel">남은 건더기: -</span>
      </div>
      <div class="game-area">
        <img class="bowl-img" src="../images/game_bowl.png" alt="그릇" onerror="console.error('Image load failed:', this.src)">
        <img class="soup-img" id="soupImg" src="../images/game_soup.png" alt="국" onerror="console.error('Image load failed:', this.src)">
        <div class="ingredients-container" id="ingredientsContainer"></div>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="screen">
    <h1 class="main-title">결과</h1>
    <div class="panel">
      <div class="result-grade" id="resultGrade"></div>
      <p class="result-ment" id="resultMent"></p>
      <p class="result-time" id="resultTime"></p>
      <p class="result-best" id="resultBest"></p>
      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="retryBtn">다시하기</button>
        <button type="button" class="btn btn-secondary" id="homeBtn">처음으로</button>
      </div>
    </div>
  </div>

  <div id="countdownOverlay" class="countdown-overlay hidden"></div>

  <script>
  (function() {
    const DIFF_CONFIG = {
      easy: { total: 30, godi: 18, namul: 12, name: '쉬움' },
      medium: { total: 50, godi: 30, namul: 20, name: '중간' },
      hard: { total: 80, godi: 48, namul: 32, name: '어려움' }
    };
    const GRADE_RULES = {
      easy: [
        { max: 6, grade: '다슬기 먹기 달인', ment: '손이 아주 빠르구나! 국물까지 싹 비웠네.' },
        { max: 12, grade: '꽤 빠른 먹방러', ment: '좋아, 제법 능숙하게 건더기를 비웠어.' },
        { max: Infinity, grade: '조금 더 연습 필요', ment: '아직은 천천히 먹는 편이네. 다시 도전해보자.' }
      ],
      medium: [
        { max: 9, grade: '다슬기국 장인', ment: '이 정도면 다슬기국 고수다.' },
        { max: 16, grade: '국물 애호가', ment: '좋은 속도야. 다음엔 더 빨라질 수 있어.' },
        { max: Infinity, grade: '천천히 먹는 스타일', ment: '맛은 잘 음미했지만 속도는 조금 아쉬워.' }
      ],
      hard: [
        { max: 13, grade: '전설의 건더기 헌터', ment: '믿기 어려울 정도의 속도야. 완벽한 클리어!' },
        { max: 22, grade: '숙련된 먹방 고수', ment: '아주 잘했다. 어려움도 무난하게 비웠네.' },
        { max: Infinity, grade: '끈기 있는 도전자', ment: '끝까지 먹어낸 건 훌륭해. 한 번 더 도전해봐.' }
      ]
    };
    const STORAGE_KEYS = { easy: 'best_easy', medium: 'best_medium', hard: 'best_hard' };

    let state = {
      nickname: '',
      difficulty: 'easy',
      total: 0,
      remaining: 0,
      startTime: 0,
      timerId: null,
      countdownDone: false
    };

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const nicknameInput = document.getElementById('nickname');
    const startBtn = document.getElementById('startBtn');
    const bestRecordEl = document.getElementById('bestRecord');
    const timerEl = document.getElementById('timer');
    const diffLabelEl = document.getElementById('diffLabel');
    const remainingLabelEl = document.getElementById('remainingLabel');
    const soupImg = document.getElementById('soupImg');
    const ingredientsContainer = document.getElementById('ingredientsContainer');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const resultGradeEl = document.getElementById('resultGrade');
    const resultMentEl = document.getElementById('resultMent');
    const resultTimeEl = document.getElementById('resultTime');
    const resultBestEl = document.getElementById('resultBest');
    const retryBtn = document.getElementById('retryBtn');
    const homeBtn = document.getElementById('homeBtn');

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
    function formatTime(ms) {
      const m = ms / 60000;
      const s = (ms % 60000) / 1000;
      const cs = (ms % 1000) / 10;
      return `${pad(m)}:${pad(s)}:${pad(cs)}`;
    }

    function getBest(diff) {
      const val = localStorage.getItem(STORAGE_KEYS[diff]);
      return val ? parseInt(val, 10) : null;
    }
    function setBest(diff, ms) {
      localStorage.setItem(STORAGE_KEYS[diff], String(ms));
    }

    function updateBestDisplay() {
      const best = getBest(state.difficulty);
      bestRecordEl.textContent = best ? `최고 기록: ${formatTime(best)}` : '최고 기록: -';
    }

    function isInEllipse(x, y, w, h) {
      const nx = (x - w / 2) / (w / 2);
      const ny = (y - h / 2) / (h / 2);
      return nx * nx + ny * ny <= 1;
    }

    function spawnIngredients() {
      ingredientsContainer.innerHTML = '';
      const cfg = DIFF_CONFIG[state.difficulty];
      const w = ingredientsContainer.offsetWidth;
      const h = ingredientsContainer.offsetHeight;
      const minSize = state.difficulty === 'easy' ? 32 : state.difficulty === 'medium' ? 28 : 24;
      const maxSize = state.difficulty === 'easy' ? 42 : state.difficulty === 'medium' ? 36 : 32;

      const items = [];
      for (let i = 0; i < cfg.godi; i++) items.push('godi');
      for (let i = 0; i < cfg.namul; i++) items.push('namul');
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }

      items.forEach((type) => {
        let x, y, attempts = 0;
        do {
          x = Math.random() * (w - maxSize);
          y = Math.random() * (h - maxSize);
          attempts++;
        } while (!isInEllipse(x + maxSize/2, y + maxSize/2, w, h) && attempts < 100);

        const size = minSize + Math.random() * (maxSize - minSize);
        const el = document.createElement('div');
        el.className = `ingredient ingredient-${type}`;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        const img = document.createElement('img');
        img.src = type === 'godi' ? '../images/game_godi.png' : '../images/game_namul.png';
        img.alt = type === 'godi' ? '다슬기' : '나물';
        img.onerror = function() { console.error('Image load failed:', this.src); };
        el.appendChild(img);
        ingredientsContainer.appendChild(el);
      });

      state.total = cfg.total;
      state.remaining = cfg.total;
      remainingLabelEl.textContent = `남은 건더기: ${state.remaining}`;
      soupImg.style.opacity = '1';
    }

    function stopTimer() {
      if (state.timerId) {
        cancelAnimationFrame(state.timerId);
        state.timerId = null;
      }
    }

    function startTimer() {
      const tick = () => {
        timerEl.textContent = formatTime(Date.now() - state.startTime);
        state.timerId = requestAnimationFrame(tick);
      };
      state.timerId = requestAnimationFrame(tick);
    }

    function showPopText(x, y) {
      const el = document.createElement('span');
      el.className = 'pop-text';
      el.textContent = Math.random() > 0.5 ? '냠!' : '+1';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }

    function handleIngredientClick(e) {
      if (!state.countdownDone) return;
      const el = e.target.closest('.ingredient');
      if (!el) return;
      e.stopPropagation();
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      el.style.transform = el.style.transform.replace(/scale\([^)]+\)/, '') + ' scale(1.18)';
      el.style.opacity = '0.5';

      setTimeout(() => {
        el.remove();
        state.remaining--;
        remainingLabelEl.textContent = `남은 건더기: ${state.remaining}`;
        soupImg.style.opacity = String(state.remaining / state.total);

        if (state.remaining <= 0) {
          stopTimer();
          soupImg.style.opacity = '0';
          showResult(Date.now() - state.startTime);
        }
      }, 100);

      showPopText(cx, cy);
    }

    function getGradeAndMent(ms) {
      const rules = GRADE_RULES[state.difficulty];
      const sec = ms / 1000;
      for (const r of rules) {
        if (sec <= r.max) return { grade: r.grade, ment: r.ment };
      }
      return { grade: rules[rules.length-1].grade, ment: rules[rules.length-1].ment };
    }

    function showResult(ms) {
      gameScreen.classList.remove('active');
      resultScreen.classList.add('active');

      const { grade, ment } = getGradeAndMent(ms);
      resultGradeEl.textContent = grade;
      resultMentEl.textContent = ment;
      resultTimeEl.textContent = `${state.nickname || '플레이어'} - ${DIFF_CONFIG[state.difficulty].name} - ${formatTime(ms)}`;

      const best = getBest(state.difficulty);
      const isNewBest = !best || ms < best;
      if (isNewBest) {
        setBest(state.difficulty, ms);
        resultBestEl.textContent = '최고 기록 갱신!';
        resultBestEl.style.display = 'block';
      } else {
        resultBestEl.textContent = `최고 기록: ${formatTime(best)}`;
        resultBestEl.style.display = 'block';
      }
    }

    function runCountdown(cb) {
      countdownOverlay.classList.remove('hidden');
      const steps = [3, 2, 1, '시작!'];
      let i = 0;
      const next = () => {
        if (i >= steps.length) {
          countdownOverlay.classList.add('hidden');
          countdownOverlay.textContent = '';
          state.countdownDone = true;
          cb();
          return;
        }
        countdownOverlay.textContent = steps[i];
        i++;
        setTimeout(next, 1000);
      };
      next();
    }

    function startGame() {
      state.countdownDone = false;
      state.nickname = nicknameInput.value.trim() || '플레이어';
      state.difficulty = document.querySelector('.diff-btn.active')?.dataset.diff || 'easy';
      const cfg = DIFF_CONFIG[state.difficulty];

      startScreen.classList.remove('active');
      gameScreen.classList.add('active');
      diffLabelEl.textContent = `난이도: ${cfg.name}`;
      spawnIngredients();

      runCountdown(() => {
        state.startTime = Date.now();
        startTimer();
      });
    }

    function bindEvents() {
      document.querySelectorAll('.diff-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.diff-btn').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          updateBestDisplay();
        });
      });

      startBtn.addEventListener('click', () => {
        if (!document.querySelector('.diff-btn.active')) {
          document.querySelector('.diff-btn[data-diff="easy"]').classList.add('active');
        }
        startGame();
      });

      ingredientsContainer.addEventListener('click', handleIngredientClick);

      retryBtn.addEventListener('click', () => {
        resultScreen.classList.remove('active');
        gameScreen.classList.add('active');
        startGame();
      });

      homeBtn.addEventListener('click', () => {
        resultScreen.classList.remove('active');
        gameScreen.classList.remove('active');
        startScreen.classList.add('active');
        stopTimer();
        updateBestDisplay();
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.diff-btn[data-diff="easy"]').classList.add('active');
      updateBestDisplay();
      bindEvents();
    });
  })();
  </script>
</body>
</html>
